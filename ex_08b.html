<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex 09</title>
</head>
<body>
    <h1>Mentes Brilhantes</h1><br>
    Insira sua nota do ENEM: <input type="number" id="ipt_nota"><br>
    Insira a nota do vestibular interno: <input type="number" id="ipt_notaVest"><br>
    <button onclick="avaliar()">Avaliação</button><br>
        <img id="img_resultado" style="max-height: 300px; display: none;">

</body>
</html>
<script>
    function avaliar(){
        let enem = Number(ipt_nota.value);
        let vestInterno = Number(ipt_notaVest.value);

        if (enem >= 800 || vestInterno >= 700) {
            alert('Parabéns! Aprovado!')
        } else {
            alert('Tente semestre que vem!')
        }
    }
</script>
