<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex 02</title>
</head>
<body>
    <h1>Consulta de direitos</h1><br>
        Insira sua renda: <input type="number" id="ipt_renda"><br>
        Insira sua renda familiar: <input type="number" id="ipt_rendaFamiliar"><br>
        <button onclick="verificar()">Verificar ajuda</button><br>
        <div id="div_msg"></div>
</body>
</html>
<script>
    function verificar(){
        let renda = Number(ipt_renda.value);
        let rendaFamiliar = Number(ipt_rendaFamiliar.value);

        if (renda < 1050 && rendaFamiliar < 2100) {
            alert('Você terá direito!')
        } else {
            alert('Você NÃO terá direito!')
        }
    }
</script>
