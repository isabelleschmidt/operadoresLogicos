<script>

        let infoPessoal = ipt_info.value;

        if (login == "ana" && senha == "braga" && infoPessoal == 1949  || infoPessoal == "louro josé") {
            div_msg.innerHTML = `Usuário autenticado!`
        } else {

        }
    }
