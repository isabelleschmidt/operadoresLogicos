<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex 05</title>
</head>
<body>
    <h1>Sistema de avaliações</h1><br>
    Insira uma nota: <input type="number" id="ipt_nota"><br>
    <button onclick="avaliar()">Avaliar aluno</button><br>
    <div id="div_msg"></div>
</body>
</html>
<script>
    function avaliar(){
        let nota = Number(ipt_nota.value);

        if (nota < 6 ) {
            alert('Aluno não aprovado')
        } else if (nota >= 8.5 && nota <= 10 ) {
            alert('Aluno exemplar!')
        } else if (nota >= 6 && nota <= 8.5 ) {
            alert('Aluno comum e aprovado.')
        }
    }
</script>
