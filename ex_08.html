<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex 08</title>
</head>
<body>
    <h1>Frutas da ju</h1><br>
    Fruta que chegou na mesa: <input type="text" id="ipt_fruta"><br>
    <button onclick="comer()">Vai comer?</button><br>
    <div id="div_msg"></div>
</body>
</html>
<script>
    function comer(){
        let frutaMesa = (ipt_fruta.value.toLowerCase());
        if (frutaMesa == "abacaxi" || frutaMesa == "uva") {
            alert(`Sim, vai comer ${frutaMesa}`)
        } else {
            alert(`A fruta ${frutaMesa} ela não come.`)
        }
    }
</script>
